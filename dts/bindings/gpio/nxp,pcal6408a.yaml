description: PCAL6408A GPIO node

compatible: "nxp,pcal6408a"

include: [i2c-device.yaml, gpio-controller.yaml]

properties:
    label:
      required: true

    ngpios:
      required: true
      const: 8

    nint-gpios:
      type: phandle-array
      required: false
      description: |
        Connection for the NINT signal. This signal is active-low when
        produced by pcal6408a GPIO node.

    init-out-low:
      type: int
      required: false
      default: 0
      description: |
        Bit mask identifying pins that should be initialized as outputs
        driven low.

    init-out-high:
      type: int
      required: false
      default: 0
      description: |
        Bit mask identifying pins that should be initialized as outputs
        driven high.

    "#gpio-cells":
      const: 2

gpio-cells:
  - pin
  - flags
