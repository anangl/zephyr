include: uart-controller.yaml

properties:
    reg:
      required: true

    interrupts:
      required: true

    tx-gpios:
      type: phandle-array
      required: false
      description: |
        The TX pin to use. The value is "<&gpioX Y flags>".
        Pin PX.Y will be used for TX. The "flags" portion currently
        has no effect, but must be set to zero.

        For example, to use P0.16 for TX, set:

          tx-gpios = <&gpio0 16 0>;

        To use P1.2 for TX, set:

          tx-gpios = <&gpio1 2 0>;

    rx-gpios:
      type: phandle-array
      required: false
      description: |
        The RX pin to use. The value should be set in the same
        way as the tx-gpios property.

    rts-gpios:
      type: phandle-array
      required: false
      description: |
        The RTS pin to use. The value should be set in the same
        way as the tx-gpios property.

    cts-gpios:
      type: phandle-array
      required: false
      description: |
        The CTS pin to use. The value should be set in the same
        way as the tx-gpios property.

    tx-pin:
      type: int
      deprecated: true
      description: |
        Deprecated; use tx-gpios instead.

        The TX pin to use.

        For pins P0.0 through P0.31, use the pin number. For example,
        to use P0.16 for TX, set:

            tx-pin = <16>;

        For pins P1.0 through P1.31, add 32 to the pin number. For
        example, to use P1.2 for TX, set:

            tx-pin = <34>;  /* 32 + 2 */

    rx-pin:
      type: int
      deprecated: true
      description: |
        Deprecated; use rx-gpios instead.

        The RX pin to use. The pin numbering scheme is the same as the
        tx-pin property's.

    rts-pin:
      type: int
      deprecated: true
      description: |
        Deprecated; use rts-gpios instead.

        The RTS pin to use. The pin numbering scheme is the same as the
        tx-pin property's.

    cts-pin:
      type: int
      deprecated: true
      description: |
        Deprecated; use cts-gpios instead.

        The CTS pin to use. The pin numbering scheme is the same as the
        tx-pin property's.

    current-speed:
      description: |
        Initial baud rate setting for UART. Only a fixed set of baud
        rates are selectable on these devices.
      enum:
        - 1200
        - 2400
        - 4800
        - 9600
        - 14400
        - 19200
        - 28800
        - 31250
        - 38400
        - 56000
        - 57600
        - 76800
        - 115200
        - 230400
        - 250000
        - 460800
        - 921600
        - 1000000
